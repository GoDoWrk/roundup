services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: roundup
      POSTGRES_PASSWORD: roundup
      POSTGRES_DB: roundup
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roundup -d roundup"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    env_file:
      - .env
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').getcode()==200 else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 6
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    command: python -m app.scheduler
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  inspector:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8081:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 6
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
