services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ROUNDUP_DB_USER:-roundup}
      POSTGRES_PASSWORD: ${ROUNDUP_DB_PASSWORD:-roundup}
      POSTGRES_DB: ${ROUNDUP_DB_NAME:-roundup}
    ports:
      - "${ROUNDUP_DB_BIND_HOST:-127.0.0.1}:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ROUNDUP_DB_USER:-roundup} -d ${ROUNDUP_DB_NAME:-roundup}"]
      interval: 10s
      timeout: 5s
      retries: 5

  miniflux-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${MINIFLUX_DB_USER:-miniflux}
      POSTGRES_PASSWORD: ${MINIFLUX_DB_PASSWORD:-miniflux}
      POSTGRES_DB: ${MINIFLUX_DB_NAME:-miniflux}
    volumes:
      - miniflux_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${MINIFLUX_DB_USER:-miniflux} -d ${MINIFLUX_DB_NAME:-miniflux}",
        ]
      interval: 10s
      timeout: 5s
      retries: 8

  miniflux:
    image: miniflux/miniflux:2.2.19
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${MINIFLUX_DB_USER:-miniflux}:${MINIFLUX_DB_PASSWORD:-miniflux}@miniflux-db:5432/${MINIFLUX_DB_NAME:-miniflux}?sslmode=disable
      RUN_MIGRATIONS: 1
      CREATE_ADMIN: 1
      ADMIN_USERNAME: ${MINIFLUX_ADMIN_USERNAME:-roundup_admin}
      ADMIN_PASSWORD: ${MINIFLUX_ADMIN_PASSWORD:-roundup_admin_change_me}
      POLLING_FREQUENCY: ${MINIFLUX_POLLING_FREQUENCY:-15}
    depends_on:
      miniflux-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/bin/miniflux", "-healthcheck", "auto"]
      interval: 15s
      timeout: 5s
      retries: 10

  miniflux-bootstrap:
    build: .
    working_dir: /app
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      MINIFLUX_URL: ${MINIFLUX_URL:-http://miniflux:8080}
      MINIFLUX_API_KEY_FILE: /miniflux-bootstrap/miniflux_api_key
      MINIFLUX_BOOTSTRAP_FEEDS_FILE: ${MINIFLUX_BOOTSTRAP_FEEDS_FILE:-/app/data/miniflux_seed_feeds.json}
      MINIFLUX_BOOTSTRAP_DEFAULT_CATEGORY: ${MINIFLUX_BOOTSTRAP_DEFAULT_CATEGORY:-Roundup Starter Feeds}
      MINIFLUX_API_KEY_DESCRIPTION: ${MINIFLUX_API_KEY_DESCRIPTION:-Roundup ingestion API key}
    command: python scripts/bootstrap_miniflux.py
    restart: "no"
    volumes:
      - miniflux_bootstrap:/miniflux-bootstrap
    depends_on:
      miniflux:
        condition: service_healthy

  migrate:
    build: .
    working_dir: /app
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      API_WORKERS: ${API_WORKERS:-1}
      INGESTION_CONCURRENCY: ${INGESTION_CONCURRENCY:-1}
      SUMMARIZATION_CONCURRENCY: ${SUMMARIZATION_CONCURRENCY:-1}
      CLUSTERING_BATCH_SIZE: ${CLUSTERING_BATCH_SIZE:-100}
      CLUSTERING_CONCURRENCY: ${CLUSTERING_CONCURRENCY:-1}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      SCHEDULER_INTERVAL_SECONDS: ${SCHEDULER_INTERVAL_SECONDS:-600}
      INSPECTOR_WORKER_PROCESSES: ${INSPECTOR_WORKER_PROCESSES:-1}
      MINIFLUX_API_KEY_FILE: /miniflux-bootstrap/miniflux_api_key
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${API_WORKERS:-1}
    ports:
      - "${ROUNDUP_BIND_HOST:-127.0.0.1}:8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json,sys,urllib.request; payload=json.load(urllib.request.urlopen('http://localhost:8000/health', timeout=5)); sys.exit(0 if payload.get('status') in {'ok','degraded'} else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 6
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      miniflux-bootstrap:
        condition: service_completed_successfully
    volumes:
      - miniflux_bootstrap:/miniflux-bootstrap:ro

  worker:
    build: .
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      INGESTION_CONCURRENCY: ${INGESTION_CONCURRENCY:-1}
      SUMMARIZATION_CONCURRENCY: ${SUMMARIZATION_CONCURRENCY:-1}
      CLUSTERING_BATCH_SIZE: ${CLUSTERING_BATCH_SIZE:-100}
      CLUSTERING_CONCURRENCY: ${CLUSTERING_CONCURRENCY:-1}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      SCHEDULER_INTERVAL_SECONDS: ${SCHEDULER_INTERVAL_SECONDS:-600}
      MINIFLUX_API_KEY_FILE: /miniflux-bootstrap/miniflux_api_key
    command: python -m app.scheduler
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      miniflux-bootstrap:
        condition: service_completed_successfully
    volumes:
      - miniflux_bootstrap:/miniflux-bootstrap:ro

  inspector:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      INSPECTOR_WORKER_PROCESSES: ${INSPECTOR_WORKER_PROCESSES:-1}
    command:
      [
        "/bin/sh",
        "-c",
        "envsubst < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'",
      ]
    ports:
      - "${ROUNDUP_BIND_HOST:-127.0.0.1}:8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 6
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  miniflux_postgres_data:
  miniflux_bootstrap:
