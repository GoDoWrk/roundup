services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: roundup
      POSTGRES_PASSWORD: roundup
      POSTGRES_DB: roundup
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roundup -d roundup"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file:
      - .env
    command: >
      /bin/sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: .
    env_file:
      - .env
    command: >
      /bin/sh -c "alembic upgrade head && python -m app.scheduler"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
